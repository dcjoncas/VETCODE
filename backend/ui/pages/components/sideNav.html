<script>
  function adminUnlockBase() {
    const port = window.location.port;
    if (port === "5500") return "http://127.0.0.1:8000";
    return window.location.origin;
  }

  function adminUnlockSession() {
    try {
      return JSON.parse(sessionStorage.getItem("devreadyAdminUnlock") || "null");
    } catch {
      return null;
    }
  }

  function ensureAdminUnlockModal() {
    let backdrop = document.getElementById("adminUnlockBackdrop");
    if (backdrop) return backdrop;
    backdrop = document.createElement("div");
    backdrop.id = "adminUnlockBackdrop";
    backdrop.className = "admin-unlock-backdrop";
    backdrop.innerHTML = `
      <form class="admin-unlock-panel" id="adminUnlockForm">
        <h2>Administrator Required</h2>
        <p>Admin is restricted to the Administrator account.</p>
        <label>
          Username
          <input id="adminUnlockUsername" name="username" autocomplete="username" value="Administrator" required />
        </label>
        <label>
          Password
          <input id="adminUnlockPassword" name="password" type="password" autocomplete="current-password" required />
        </label>
        <div id="adminUnlockError" class="admin-unlock-error"></div>
        <div class="admin-unlock-actions">
          <button class="btn secondary" type="button" id="adminUnlockCancel">Cancel</button>
          <button class="btn primary" type="submit">Unlock Admin</button>
        </div>
      </form>
    `;
    document.body.appendChild(backdrop);
    backdrop.querySelector("#adminUnlockCancel").addEventListener("click", () => backdrop.classList.remove("open"));
    backdrop.addEventListener("click", (event) => {
      if (event.target === backdrop) backdrop.classList.remove("open");
    });
    return backdrop;
  }

  async function unlockAdminFor(targetHref) {
    const existing = adminUnlockSession();
    if (existing?.token) {
      window.location.href = targetHref;
      return;
    }
    const backdrop = ensureAdminUnlockModal();
    const form = backdrop.querySelector("#adminUnlockForm");
    const error = backdrop.querySelector("#adminUnlockError");
    form.onsubmit = async (event) => {
      event.preventDefault();
      error.textContent = "";
      const body = new URLSearchParams(new FormData(form));
      try {
        const response = await fetch(`${adminUnlockBase()}/api/access/admin-login`, {
          method: "POST",
          headers: { "Content-Type": "application/x-www-form-urlencoded" },
          body: body.toString(),
        });
        const text = await response.text();
        if (!response.ok) {
          let message = text;
          try {
            message = JSON.parse(text).detail || text;
          } catch {}
          throw new Error(message);
        }
        const data = JSON.parse(text);
        sessionStorage.setItem("devreadyAdminUnlock", JSON.stringify({
          token: data.token,
          user: data.user,
          unlocked_at: new Date().toISOString(),
        }));
        window.location.href = targetHref;
      } catch (err) {
        error.textContent = err.message || "Admin unlock failed.";
      }
    };
    backdrop.classList.add("open");
    setTimeout(() => backdrop.querySelector("#adminUnlockPassword")?.focus(), 0);
  }

  const currentNavPath = window.location.pathname.replace(/\/$/, "");
  const navLinks = document.querySelectorAll("#pageNav a");
  navLinks.forEach((link) => {
    const linkPath = new URL(link.href).pathname.replace(/\/$/, "");

    if (currentNavPath === linkPath) {
      link.classList.add("active");
    }
  });

  document.querySelector("#pageNavInner .admin-link")?.addEventListener("click", (event) => {
    event.preventDefault();
    unlockAdminFor(event.currentTarget.href);
  });

  document.querySelector("#pageNavInner .agents-link")?.addEventListener("click", (event) => {
    event.preventDefault();
    unlockAdminFor(event.currentTarget.href);
  });
</script>
