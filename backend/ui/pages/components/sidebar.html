<aside class="sidebar">
  <a id="textBlockLogo" class="brand" href="find-candidate.html" aria-label="Home - Talent">
    <img
      class="domainLogo"
      src="../assets/devLogo.svg"
      alt="DevReady"
      style="width: 42px; height: 42px"
    />
    <div class="title">
      <span id="domainLabelSidebar">DEV</span>
      <span>READY</span>
      <span class="sub">Vetting Workspace</span>
    </div>
  </a>

  <a id="imgLogoLink" class="logo-home" href="find-candidate.html" aria-label="Home - Talent" style="display: none">
    <img
      id="imgLogo"
      src="../assets/lawLogo.png"
      style="width: 100%"
    />
  </a>

  <div class="userbox">
    <div style="font-size: 12px; opacity: 0.9">Welcome back,</div>
    <div class="name">Darrin Joncas</div>
    <div
      id="environmentBadge"
      class="badge"
      style="
        margin-top: 10px;
        width: 100%;
        justify-content: center;
        background: rgba(255, 255, 255, 0.16);
      "
    >
      Environment: Local
    </div>
    <div
      style="
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-top: 8px;
      "
    >
      <a
        id="devEnvironmentLink"
        class="badge"
        href="https://vetcode-dev.up.railway.app/ui/pages/find-candidate.html"
        style="justify-content: center; background: rgba(18, 91, 54, 0.9)"
        >Dev</a
      >
      <a
        id="productionEnvironmentLink"
        class="badge"
        href="https://vetcode-production.up.railway.app/ui/pages/find-candidate.html"
        style="justify-content: center; background: rgba(190, 38, 51, 0.86)"
        >Production</a
      >
    </div>
    <div
      class="field"
      style="margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap"
    >
      <select
        id="domainSelect"
        class="badge"
        style="background: rgba(16, 32, 24, 0.1); color: #f5f7f7"
        onchange="domainSwap()"
      >
        <option value="dev" style="color: black">Technology Domain</option>
        <option value="law" style="color: black">Law Domain</option>
      </select>
    </div>
  </div>
  <div id="pageNav"></div>

  <div class="footer">
    DevReady - www.devready.io<br />
    Internal and external candidate workflows
  </div>
</aside>

<script>
  $(function () {
    $("#pageNav").load("components/sideNav.html");

    const select = document.getElementById("domainSelect");

    const params = new URLSearchParams(window.location.search);
    const domainFromUrl = params.get("domain");

    if (domainFromUrl) {
      select.value = domainFromUrl;
      sessionStorage.setItem("domain", domainFromUrl);
    } else {
      const savedDomain = sessionStorage.getItem("domain");
      if (savedDomain) {
        select.value = savedDomain;
      }
    }

    domainUpdate(select.value);
    environmentUpdate();
  });

  function domainSwap() {
    const currentDomain = document.getElementById("domainSelect").value;

    sessionStorage.setItem("domain", currentDomain);
    const url = new URL(window.location);
    url.searchParams.set("domain", currentDomain);
    window.history.replaceState({}, "", url);

    domainUpdate(currentDomain);
  }

  function domainUpdate(currentDomain) {
    document.getElementById("domainLabelSidebar").innerHTML =
      currentDomain.toUpperCase();

    const logoSet = document.getElementsByClassName("domainLogo");

    if (currentDomain == "law") {
      document.getElementById("textBlockLogo").style.display = "none";
      document.getElementById("imgLogoLink").style.display = "block";
    } else {
      document.getElementById("textBlockLogo").style.display = "flex";
      document.getElementById("imgLogoLink").style.display = "none";
    }

    for (const logo of logoSet) {
      logo.src = `../assets/${currentDomain}Logo.svg`;
      logo.href = `../assets/${currentDomain}Logo.svg`;
    }

    document.getElementById("domainCss").href =
      `../assets/${currentDomain}Styles.css`;
  }

  function environmentUpdate() {
    const host = window.location.host;
    const path = window.location.pathname;
    const badge = document.getElementById("environmentBadge");
    const devLink = document.getElementById("devEnvironmentLink");
    const productionLink = document.getElementById("productionEnvironmentLink");

    const normalizedPath = path.includes("/ui/pages/")
      ? path
      : `/ui/pages/${path.split("/").pop() || "find-candidate.html"}`;

    devLink.href = `https://vetcode-dev.up.railway.app${normalizedPath}`;
    productionLink.href = `https://vetcode-production.up.railway.app${normalizedPath}`;

    if (host.includes("vetcode-production")) {
      badge.textContent = "Environment: Production";
      badge.style.background = "rgba(190, 38, 51, 0.86)";
    } else if (host.includes("vetcode-dev")) {
      badge.textContent = "Environment: Development";
      badge.style.background = "rgba(18, 91, 54, 0.9)";
    } else {
      badge.textContent = "Environment: Local";
      badge.style.background = "rgba(255, 255, 255, 0.16)";
    }
  }
</script>
