<script>
  function ensureDevReadyModal() {
    let backdrop = document.getElementById("devreadyModalBackdrop");
    if (backdrop) return backdrop;
    backdrop = document.createElement("div");
    backdrop.id = "devreadyModalBackdrop";
    backdrop.className = "devready-modal-backdrop";
    backdrop.innerHTML = `
      <div class="devready-modal" role="dialog" aria-modal="true" aria-labelledby="devreadyModalTitle">
        <div class="devready-modal-head">
          <div class="devready-modal-mark">DR</div>
          <h2 id="devreadyModalTitle" class="devready-modal-title">DevReady</h2>
        </div>
        <div id="devreadyModalBody" class="devready-modal-body"></div>
        <div class="devready-modal-actions">
          <button id="devreadyModalOk" class="btn primary" type="button">OK</button>
        </div>
      </div>
    `;
    document.body.appendChild(backdrop);
    backdrop.addEventListener("click", (event) => {
      if (event.target === backdrop) closeDevReadyModal();
    });
    backdrop.querySelector("#devreadyModalOk").addEventListener("click", closeDevReadyModal);
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeDevReadyModal();
    });
    return backdrop;
  }

  function closeDevReadyModal() {
    document.getElementById("devreadyModalBackdrop")?.classList.remove("open");
  }

  function showDevReadyModal(title, content) {
    const backdrop = ensureDevReadyModal();
    backdrop.querySelector("#devreadyModalTitle").textContent = title || "DevReady";
    const body = backdrop.querySelector("#devreadyModalBody");
    if (Array.isArray(content)) {
      body.innerHTML = `<div class="devready-modal-list">${content
        .map(
          (row) => `<div class="devready-modal-row"><strong>${escapeModal(row.label)}</strong><span>${escapeModal(row.value)}</span></div>`,
        )
        .join("")}</div>`;
    } else {
      body.innerHTML = `<pre>${escapeModal(content || "")}</pre>`;
    }
    backdrop.classList.add("open");
    setTimeout(() => backdrop.querySelector("#devreadyModalOk")?.focus(), 0);
  }

  function escapeModal(value) {
    return String(value || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#039;");
  }

  window.devReadyAlert = showDevReadyModal;
  window.alert = (message) => showDevReadyModal("DevReady", message);

  $(function () {
    applyLoggedInUser();
    const params = new URLSearchParams(window.location.search);
    const domainFromUrl = params.get("domain");
    let activeDomain = domainFromUrl || sessionStorage.getItem("domain") || "dev";
    activeDomain = activeDomain === "technology" ? "dev" : activeDomain;

    if (domainFromUrl) {
      sessionStorage.setItem("domain", activeDomain);
    }

    syncDomainSelect(activeDomain);
    domainUpdate(activeDomain);
    initPageAgentDock();
    loadPageAgentRuntime(renderActivePageAgent);
    $("#pageNav").load("components/sideNav.html?v=20260515-status-nav", function () {
      applyMenuAccess();
      applyDomainToLocalLinks(sessionStorage.getItem("domain") || "dev");
    });
    applyGlobalHints();
    initGlobalHints();
    environmentUpdate();
  });

  function currentDevReadyUser() {
    try {
      return JSON.parse(sessionStorage.getItem("devreadyUser") || localStorage.getItem("devreadyUser") || "null");
    } catch {
      return null;
    }
  }

  function applyLoggedInUser() {
    const user = currentDevReadyUser();
    if (!user) {
      window.location.href = "/ui/index.html";
      return;
    }
    const name = document.getElementById("sidebarUserName");
    if (name && user) {
      name.textContent = user.display_name || user.username || user.email || "DevReady User";
    }
  }

  function applyMenuAccess() {
    const user = currentDevReadyUser();
    if (!user) {
      window.location.href = "/ui/index.html";
      return;
    }
    const isAdministrator = String(user.username || "").trim().toLowerCase() === "administrator";
    const isSuperUser = user.role === "super_user";
    if (!isAdministrator) {
      document.querySelector('#pageNavInner [data-menu-key="admin"]')?.remove();
    }
    if (!isAdministrator && !isSuperUser) {
      document.querySelector('#pageNavInner [data-menu-key="agents"]')?.remove();
    }
    if (isSuperUser) return;
    const allowed = new Set(user.allowed_menu || []);
    if (isAdministrator) {
      allowed.add("admin");
      allowed.add("agents");
    }
    if (allowed.has("interviews")) {
      allowed.add("status");
    }
    document.querySelectorAll("#pageNavInner [data-menu-key]").forEach((item) => {
      const key = item.dataset.menuKey;
      if (!allowed.has(key)) item.remove();
    });
    document.querySelectorAll("#pageNavInner .nav-group").forEach((group) => {
      if (!group.querySelector("a")) group.remove();
    });
  }

  function hintsEnabled() {
    return localStorage.getItem("devreadyHints") !== "off";
  }

  function applyGlobalHints() {
    const enabled = hintsEnabled();
    document.body.classList.toggle("hints-off", !enabled);
    const toggle = document.getElementById("hintToggle");
    if (toggle) {
      toggle.textContent = enabled ? "Hints On" : "Hints Off";
      toggle.setAttribute("aria-pressed", enabled ? "true" : "false");
    }
  }

  function toggleGlobalHints() {
    localStorage.setItem("devreadyHints", hintsEnabled() ? "off" : "on");
    applyGlobalHints();
    hideGlobalHint();
  }

  function normalizeHintLabel(value) {
    return String(value || "").replace(/\s+/g, " ").trim();
  }

  function weakHintFor(label, hint) {
    const cleanLabel = normalizeHintLabel(label).toLowerCase();
    const cleanHint = normalizeHintLabel(hint).toLowerCase();
    if (!cleanLabel || !cleanHint) return false;
    return (
      cleanHint === cleanLabel ||
      cleanHint === `use ${cleanLabel}.` ||
      cleanHint === `open ${cleanLabel}.` ||
      cleanHint === `select ${cleanLabel}.` ||
      cleanHint === `click ${cleanLabel}.`

    if (text.includes("search")) return "Find matching records using the text and filters currently entered.";
    if (text.includes("select")) return "Choose this item and attach it to the current workflow step.";
    if (text.includes("send")) return "Prepare or deliver the current message using the selected recipient context.";
    if (text.includes("copy")) return "Copy the generated value so it can be pasted elsewhere.";
    if (text.includes("email")) return "Open an email draft with the relevant link or message included.";
    if (text.includes("open")) return "Open the related workspace, profile, or record for review.";
    if (text.includes("continue") || text.includes("next")) return "Move forward using the current candidate and job context.";
    if (text.includes("back") || text.includes("return")) return "Return to the previous workflow area.";
    if (text.includes("block")) return "Disable access for this account until it is unblocked.";
    if (text.includes("approve")) return "Mark this item approved for the next operations step.";
    if (text.includes("process")) return "Mark this item as handled so it is separated from pending work.";
    if (element?.tagName === "SELECT") return "Choose the value that controls what this section displays or updates.";
    if (element?.tagName === "INPUT" && element?.type === "file") {
      return "Choose a local file to upload into this workflow.";
    }
    return "Run this control for the current section. Check the nearby heading to confirm which record will change.";
  }

  function applyButtonHints(root = document) {
    root
      .querySelectorAll("button, a.btn, .nav a, select, input[type='file'], [data-hint]")
      .forEach((element) => {
        const label =
          element.getAttribute("aria-label") ||
          element.getAttribute("title") ||
          element.textContent ||
          element.getAttribute("placeholder") ||
          element.id ||
          "";
        if (element.dataset.hint && !weakHintFor(label, element.dataset.hint)) {
          if (element.getAttribute("title")) {
            element.dataset.nativeTitle = element.getAttribute("title");
            element.removeAttribute("title");
          }
          return;
        }
        const hint = defaultHintFor(label, element);
        if (hint) element.dataset.hint = hint;
        if (element.getAttribute("title")) {
          element.dataset.nativeTitle = element.getAttribute("title");
          element.removeAttribute("title");
        }
      });
  }

  function ensureGlobalHintTooltip() {
    let tooltip = document.getElementById("globalHintTooltip");
    if (!tooltip) {
      tooltip = document.createElement("div");
      tooltip.id = "globalHintTooltip";
      tooltip.className = "global-hint-tooltip";
      tooltip.setAttribute("role", "tooltip");
      document.body.appendChild(tooltip);
    }
    return tooltip;
  }

  function showGlobalHint(element) {
    if (!hintsEnabled() || !element?.dataset?.hint) return;
    const tooltip = ensureGlobalHintTooltip();
    tooltip.textContent = element.dataset.hint;
    tooltip.classList.add("visible");

    const rect = element.getBoundingClientRect();
    const tooltipRect = tooltip.getBoundingClientRect();
    const margin = 10;
    let left = rect.left;
    let top = rect.bottom + 8;

    if (left + tooltipRect.width + margin > window.innerWidth) {
      left = window.innerWidth - tooltipRect.width - margin;
    }
    if (top + tooltipRect.height + margin > window.innerHeight) {
      top = rect.top - tooltipRect.height - 8;
    }

    tooltip.style.left = `${Math.max(margin, left)}px`;
    tooltip.style.top = `${Math.max(margin, top)}px`;
  }

  function hideGlobalHint() {
    document.getElementById("globalHintTooltip")?.classList.remove("visible");
  }

  function initGlobalHints() {
    applyButtonHints();
    ensureGlobalHintTooltip();
    document.addEventListener("mouseover", (event) => {
      const target = event.target.closest("[data-hint]");
      if (target) showGlobalHint(target);
    });
    document.addEventListener("focusin", (event) => {
      const target = event.target.closest("[data-hint]");
      if (target) showGlobalHint(target);
    });
    document.addEventListener("mouseout", (event) => {
      if (event.target.closest("[data-hint]")) hideGlobalHint();
    });
    document.addEventListener("focusout", hideGlobalHint);
    document.addEventListener("scroll", hideGlobalHint, true);
    window.addEventListener("resize", hideGlobalHint);

    const observer = new MutationObserver((mutations) => {
      mutations.forEach((mutation) => {
        mutation.addedNodes.forEach((node) => {
          if (node.nodeType === 1) applyButtonHints(node);
        });
      });
    });
    observer.observe(document.body, { childList: true, subtree: true });
  }

  function domainSwap() {
    const currentDomain = document.getElementById("domainSelect")?.value || sessionStorage.getItem("domain") || "dev";

    clearDomainProcessTrail();
    sessionStorage.setItem("domain", currentDomain);
    const url = new URL(window.location);
    url.searchParams.set("domain", currentDomain);

    window.location.href = url.toString();
  }

  function syncDomainSelect(currentDomain) {
    const select = document.getElementById("domainSelect");
    if (select) select.value = currentDomain || "dev";
  }

  function domainUpdate(currentDomain) {
    syncDomainSelect(currentDomain);
    const domainLabel = currentDomain === "engineer" ? "BUILD" : currentDomain.toUpperCase();
    document.getElementById("domainLabelSidebar").innerHTML = domainLabel;
    document.getElementById("readyLabelSidebar").innerHTML = "READY";

    const logoSet = document.getElementsByClassName("domainLogo");

    document.getElementById("textBlockLogo").style.display = "flex";

    for (const logo of logoSet) {
      logo.src = `../assets/${currentDomain}Logo.svg`;
      logo.href = `../assets/${currentDomain}Logo.svg`;
    }

    document.getElementById("domainCss").href =
      `../assets/${currentDomain}Styles.css`;
    applyDomainToLocalLinks(currentDomain);
    if (typeof renderActivePageAgent === "function") renderActivePageAgent();
    environmentUpdate();
  }

  function applyDomainToLocalLinks(currentDomain) {
    document.querySelectorAll("a[href]").forEach((link) => {
      const rawHref = link.getAttribute("href") || "";
      if (
        !rawHref ||
        rawHref.startsWith("#") ||
        rawHref.startsWith("mailto:") ||
        rawHref.startsWith("http") ||
        rawHref.includes("/ui/index.html")
      ) {
        return;
      }
      try {
        const url = new URL(rawHref, window.location.href);
        if (url.origin !== window.location.origin) return;
        if (!url.pathname.endsWith(".html")) return;
        url.searchParams.set("domain", currentDomain || "dev");
        link.setAttribute("href", `${url.pathname.split("/").pop()}${url.search}${url.hash}`);
      } catch {
        return;
      }
    });
  }

  function clearDomainProcessTrail() {
    const keys = [
      "candidateId",
      "candidateName",
      "candidateEmail",
      "candidateStatus",
      "candidateProfileType",
      "candidateTopMatches",
      "candidateResumeUrl",
      "externalCandidateSource",
      "shortlist",
      "clientEmail",
      "jobID",
      "jobId",
      "selectedJdId",
      "jdId",
      "jobCompany",
      "jobTitle",
      "jobSkills",
      "temporaryProfiles",
      "totalProfiles",
      "recentProfiles",
      "pipelineProfiles",
      "latestScheduleTracking",
    ];
    keys.forEach((key) => sessionStorage.removeItem(key));
  }

  async function environmentUpdate() {
    const host = window.location.host;
    const notice = document.getElementById("environmentNotice");
    const domain = sessionStorage.getItem("domain") || document.getElementById("domainSelect")?.value || "dev";
    const domainName =
      domain === "law"
        ? "Law Domain"
        : domain === "engineer"
          ? "Engineer Domain"
          : "Technology Domain";
    const now = new Date().toLocaleString([], {
      year: "numeric",
      month: "short",
      day: "numeric",
      hour: "numeric",
      minute: "2-digit",
      timeZoneName: "short",
    });

    let environmentName = "Local";
    let sourceName = "Local source";
    let background = "rgba(255, 255, 255, 0.16)";
    let databaseName = "local";
    let databaseHost = "local";
    let storageContainer = "local";
    let publicDomain = host || "localhost";

    if (host.includes("vetcode-production")) {
      environmentName = "Production";
      sourceName = "Production Railway";
      background = "rgba(190, 38, 51, 0.86)";
    } else if (host.includes("vetcode-dev")) {
      environmentName = "Development";
      sourceName = "Development Railway";
      background = "rgba(18, 91, 54, 0.9)";
    }

    try {
      const response = await fetch("/api/environment", { cache: "no-store" });
      if (response.ok) {
        const env = await response.json();
        environmentName = env.environment || environmentName;
        sourceName = env.source || sourceName;
        background = env.badge_color || background;
        databaseName = env.database_name || databaseName;
        databaseHost = env.database_host || databaseHost;
        storageContainer = env.storage_container || storageContainer;
        publicDomain = env.public_domain || publicDomain;
      }
    } catch (error) {
      sourceName = `${sourceName} - backend environment check unavailable`;
    }

    const statusRows = [
      { label: "Updated", value: now },
      { label: "Domain", value: domainName },
      { label: "Database", value: databaseName },
      { label: "DB host", value: databaseHost },
      { label: "Storage", value: storageContainer },
      { label: "App", value: publicDomain },
      { label: "Source", value: sourceName },
    ];
    const statusText = [
      "Workspace status",
      ...statusRows.map((row) => `${row.label}: ${row.value}`),
    ].join("\n");
    notice.innerHTML = `<button class="workspace-status-button" type="button">Workspace status</button>`;
    const button = notice.querySelector("button");
    button.dataset.hint = statusText;
    button.setAttribute("aria-label", statusText);
    button.onclick = () => showDevReadyModal("Workspace Status", statusRows);
    if (typeof applyButtonHints === "function") applyButtonHints(notice);
  }

  setInterval(environmentUpdate, 60000);

  function loadPageAgentRuntime(callback) {
    let called = false;
    const runCallback = () => {
      if (called || !window.DevReadyPageAgents) return;
      called = true;
      document.dispatchEvent(new CustomEvent("devready-page-agents-ready"));
      callback();
    };
    if (window.DevReadyPageAgents) {
      runCallback();
      return;
    }
    const existingScript = document.querySelector('script[data-page-agents-runtime="1"]');
    if (existingScript) {
      existingScript.addEventListener("load", runCallback, { once: true });
      document.addEventListener("devready-page-agents-ready", runCallback, { once: true });
      setTimeout(runCallback, 100);
      return;
    }
    const script = document.createElement("script");
    script.src = "JS/pageAgents.js?v=20260515-numa-inline-label";
    script.dataset.pageAgentsRuntime = "1";
    script.onload = runCallback;
    document.head.appendChild(script);
  }

  function initPageAgentDock() {
    if (document.getElementById("agentOrbButton")) return;
    const shell = document.createElement("div");
    shell.innerHTML = `
      <button id="agentOrbButton" class="agent-orb-button" type="button" aria-label="Ask Numa">
        <i class="agent-orb" aria-hidden="true"></i>
        <span id="agentOrbLabel">Ask Numa</span>
      </button>
      <section id="agentChatPanel" class="agent-chat-panel" aria-label="Ask Numa">
        <div class="agent-chat-head">
          <i id="agentPanelOrb" class="agent-orb" aria-hidden="true"></i>
          <div class="agent-chat-title">
            <strong id="agentPanelName">Numa</strong>
            <span id="agentPanelPage">Ready</span>
          </div>
          <button id="agentChatClose" class="agent-chat-close" type="button" aria-label="Close agent">x</button>
        </div>
        <div id="agentChatLog" class="agent-chat-log"></div>
        <form id="agentChatForm" class="agent-chat-form">
          <input id="agentChatInput" autocomplete="off" placeholder="Ask Numa..." />
          <button class="btn" type="submit">Ask</button>
        </form>
      </section>
    `;
    document.body.appendChild(shell);

    document.getElementById("agentOrbButton").addEventListener("click", () => {
      const panel = document.getElementById("agentChatPanel");
      panel.classList.toggle("open");
      if (panel.classList.contains("open")) document.getElementById("agentChatInput")?.focus();
    });
    document.getElementById("agentChatClose").addEventListener("click", () => {
      document.getElementById("agentChatPanel").classList.remove("open");
    });
    document.getElementById("agentChatForm").addEventListener("submit", askActivePageAgent);
    window.addEventListener("devready-agent-activated", renderActivePageAgent);
    renderActivePageAgent();
  }

  function renderActivePageAgent() {
    const agent = window.DevReadyPageAgents?.active();
    const button = document.getElementById("agentOrbButton");
    if (!button) return;
    button.classList.toggle("visible", Boolean(agent));
    if (!agent) return;
    const agentColor = window.DevReadyPageAgents?.domainColor?.() || getComputedStyle(document.documentElement).getPropertyValue("--primary-2").trim() || agent.color;
    const agentIcon = window.DevReadyPageAgents?.icon?.(agent.key) || fallbackAgentIconSvg();
    document.querySelectorAll("#agentOrbButton .agent-orb, #agentPanelOrb").forEach((orb) => {
      orb.style.setProperty("--agent-color", agentColor);
      orb.innerHTML = agentIcon;
    });
    document.getElementById("agentOrbLabel").textContent = "Ask Numa";
    document.getElementById("agentPanelName").textContent = "Numa";
    document.getElementById("agentPanelPage").textContent = `${agent.page} specialist`;
    const log = document.getElementById("agentChatLog");
    if (log && !log.dataset.agentKey) {
      log.dataset.agentKey = agent.key;
      log.innerHTML = `<div class="agent-msg">Ask Numa.</div>`;
    } else if (log && log.dataset.agentKey !== agent.key) {
      log.dataset.agentKey = agent.key;
      log.innerHTML = `<div class="agent-msg">Ask Numa.</div>`;
    }
  }

  function fallbackAgentIconSvg() {
    return `<svg viewBox="0 0 24 24" aria-hidden="true">
      <circle cx="12" cy="12" r="4"></circle>
      <path d="M12 3v3"></path>
      <path d="M12 18v3"></path>
      <path d="M3 12h3"></path>
      <path d="M18 12h3"></path>
    </svg>`;
  }

  async function askActivePageAgent(event) {
    event.preventDefault();
    const agent = window.DevReadyPageAgents?.active();
    const input = document.getElementById("agentChatInput");
    const message = input.value.trim();
    if (!agent || !message) return;
    input.value = "";
    appendAgentMessage(message, "user");
    appendAgentMessage("Thinking through the page context...", "assistant", true);
    const form = new FormData();
    form.append("agent_key", agent.key);
    form.append("message", message);
    form.append("domain", sessionStorage.getItem("domain") || "dev");
    form.append("context_json", JSON.stringify(window.DevReadyPageAgents.context()));
    try {
      form.append("admin_token", JSON.parse(sessionStorage.getItem("devreadyAdminUnlock") || "null")?.token || "");
    } catch {
      form.append("admin_token", "");
    }
    form.append("numa_change_mode", localStorage.getItem("devreadyNumaChangeMode") === "on" ? "on" : "off");
    try {
      const response = await fetch("/api/agents/ask", { method: "POST", body: form });
      const data = await response.json();
      replacePendingAgentMessage(data.answer || "I could not build an answer for that yet.");
    } catch (error) {
      replacePendingAgentMessage("The agent endpoint is not available yet. I am still activated on this page for when the backend is running.");
    }
  }

  function appendAgentMessage(text, role, pending = false) {
    const log = document.getElementById("agentChatLog");
    const bubble = document.createElement("div");
    bubble.className = `agent-msg${role === "user" ? " user" : ""}`;
    if (pending) bubble.dataset.pending = "1";
    bubble.textContent = text;
    log.appendChild(bubble);
    log.scrollTop = log.scrollHeight;
  }

  function replacePendingAgentMessage(text) {
    const pending = document.querySelector('#agentChatLog [data-pending="1"]');
    if (pending) {
      pending.textContent = text;
      pending.removeAttribute("data-pending");
    } else {
      appendAgentMessage(text, "assistant");
    }
  }
</script>
