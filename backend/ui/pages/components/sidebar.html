<aside class="sidebar">
  <a id="textBlockLogo" class="brand" href="../index.html" aria-label="Home - Welcome">
    <img
      class="domainLogo"
      src="../assets/devLogo.svg"
      alt="DevReady"
      style="width: 42px; height: 42px"
    />
    <div class="title">
      <span id="domainLabelSidebar">DEV</span>
      <span id="readyLabelSidebar">READY</span>
      <span class="sub">Vetting Workspace</span>
    </div>
  </a>

  <div class="userbox">
    <a
      href="https://devready.io/contact/"
      target="_blank"
      rel="noopener"
      style="
        display: block;
        margin-bottom: 10px;
        padding: 8px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
        color: #125b36;
        font-size: 12px;
        font-weight: 900;
        text-align: center;
      "
      >Contact DevReady</a
    >
    <div style="font-size: 12px; opacity: 0.9">Welcome back,</div>
    <div id="sidebarUserName" class="name">DevReady User</div>
    <div
      id="environmentNotice"
      class="workspace-status-link"
      style="
        margin-top: 8px;
        padding: 0;
        background: transparent;
        color: #fff;
        font-size: 12px;
        line-height: 1.2;
      "
    >
      Loading workspace status...
    </div>
    <div
      class="field"
      style="margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap"
    >
      <button
        id="hintToggle"
        class="badge hint-toggle"
        type="button"
        onclick="toggleGlobalHints()"
        data-hint="Turn guidance notes and hover tips on or off across the workspace."
        title="Toggle guidance hints"
      >
        Hints On
      </button>
    </div>
  </div>
  <div id="pageNav"></div>

  <div class="footer">
    DevReady - www.devready.io<br />
    Internal and external candidate workflows
  </div>
</aside>

<script>
  $(function () {
    applyLoggedInUser();
    $("#pageNav").load("components/sideNav.html", function () {
      applyMenuAccess();
    });

    const params = new URLSearchParams(window.location.search);
    const domainFromUrl = params.get("domain");
    let activeDomain = domainFromUrl || sessionStorage.getItem("domain") || "dev";

    if (domainFromUrl) {
      sessionStorage.setItem("domain", domainFromUrl);
    }

    syncDomainSelect(activeDomain);
    domainUpdate(activeDomain);
    applyGlobalHints();
    initGlobalHints();
    environmentUpdate();
  });

  function currentDevReadyUser() {
    try {
      return JSON.parse(sessionStorage.getItem("devreadyUser") || localStorage.getItem("devreadyUser") || "null");
    } catch {
      return null;
    }
  }

  function applyLoggedInUser() {
    const user = currentDevReadyUser();
    const name = document.getElementById("sidebarUserName");
    if (name && user) {
      name.textContent = user.display_name || user.username || user.email || "DevReady User";
    }
  }

  function applyMenuAccess() {
    const user = currentDevReadyUser();
    if (!user || user.role === "super_user") return;
    const allowed = new Set(user.allowed_menu || []);
    document.querySelectorAll("#pageNavInner [data-menu-key]").forEach((item) => {
      const key = item.dataset.menuKey;
      if (!allowed.has(key)) item.remove();
    });
    document.querySelectorAll("#pageNavInner .nav-group").forEach((group) => {
      if (!group.querySelector("a")) group.remove();
    });
  }

  function hintsEnabled() {
    return localStorage.getItem("devreadyHints") !== "off";
  }

  function applyGlobalHints() {
    const enabled = hintsEnabled();
    document.body.classList.toggle("hints-off", !enabled);
    const toggle = document.getElementById("hintToggle");
    if (toggle) {
      toggle.textContent = enabled ? "Hints On" : "Hints Off";
      toggle.setAttribute("aria-pressed", enabled ? "true" : "false");
    }
  }

  function toggleGlobalHints() {
    localStorage.setItem("devreadyHints", hintsEnabled() ? "off" : "on");
    applyGlobalHints();
    hideGlobalHint();
  }

  function normalizeHintLabel(value) {
    return String(value || "").replace(/\s+/g, " ").trim();
  }

  function defaultHintFor(label, element) {
    const text = normalizeHintLabel(label).toLowerCase();
    const exact = {
      search: "Search the current page or profile list using the text you entered.",
      upload: "Upload the selected file and start the matching profile action.",
      refresh: "Reload the latest data for this section.",
      delete: "Remove this item. Use carefully because this may affect saved workflow data.",
      remove: "Remove this row from the current editable section.",
      save: "Save the changes in this section.",
      "save all": "Save all editable sections on this page.",
      "start over": "Clear the current candidate, job, shortlist, and process trail.",
      "load jd": "Load the selected job description into the current workflow.",
      "create chat link": "Create a secure candidate chat link for profile completion.",
      "copy link": "Copy this link so you can send it manually.",
      "email candidate": "Open an email draft addressed to the selected candidate.",
      "view process map": "Open the full workflow map with the current step highlighted.",
      map: "Open the full workflow map with the current step highlighted.",
    };
    if (exact[text]) return exact[text];
    if (text.includes("save")) return "Save the current changes.";
    if (text.includes("upload")) return "Upload the selected file and process it.";
    if (text.includes("load")) return "Load the selected item into this workflow.";
    if (text.includes("refresh")) return "Refresh this section with the latest data.";
    if (text.includes("delete")) return "Delete the selected item after confirmation.";
    if (text.includes("open")) return "Open this workspace or record.";
    if (text.includes("continue") || text.includes("next")) return "Continue to the next step in the workflow.";
    if (text.includes("back") || text.includes("return")) return "Go back to the previous workspace.";
    if (element?.tagName === "SELECT") return "Choose an option for this section.";
    return label ? `Use ${label}.` : "";
  }

  function applyButtonHints(root = document) {
    root
      .querySelectorAll("button, a.btn, .nav a, select, input[type='file'], [data-hint]")
      .forEach((element) => {
        if (element.dataset.hint) {
          if (element.getAttribute("title")) {
            element.dataset.nativeTitle = element.getAttribute("title");
            element.removeAttribute("title");
          }
          return;
        }
        const label =
          element.getAttribute("aria-label") ||
          element.getAttribute("title") ||
          element.textContent ||
          element.getAttribute("placeholder") ||
          element.id ||
          "";
        const hint = defaultHintFor(label, element);
        if (hint) element.dataset.hint = hint;
        if (element.getAttribute("title")) {
          element.dataset.nativeTitle = element.getAttribute("title");
          element.removeAttribute("title");
        }
      });
  }

  function ensureGlobalHintTooltip() {
    let tooltip = document.getElementById("globalHintTooltip");
    if (!tooltip) {
      tooltip = document.createElement("div");
      tooltip.id = "globalHintTooltip";
      tooltip.className = "global-hint-tooltip";
      tooltip.setAttribute("role", "tooltip");
      document.body.appendChild(tooltip);
    }
    return tooltip;
  }

  function showGlobalHint(element) {
    if (!hintsEnabled() || !element?.dataset?.hint) return;
    const tooltip = ensureGlobalHintTooltip();
    tooltip.textContent = element.dataset.hint;
    tooltip.classList.add("visible");

    const rect = element.getBoundingClientRect();
    const tooltipRect = tooltip.getBoundingClientRect();
    const margin = 10;
    let left = rect.left;
    let top = rect.bottom + 8;

    if (left + tooltipRect.width + margin > window.innerWidth) {
      left = window.innerWidth - tooltipRect.width - margin;
    }
    if (top + tooltipRect.height + margin > window.innerHeight) {
      top = rect.top - tooltipRect.height - 8;
    }

    tooltip.style.left = `${Math.max(margin, left)}px`;
    tooltip.style.top = `${Math.max(margin, top)}px`;
  }

  function hideGlobalHint() {
    document.getElementById("globalHintTooltip")?.classList.remove("visible");
  }

  function initGlobalHints() {
    applyButtonHints();
    ensureGlobalHintTooltip();
    document.addEventListener("mouseover", (event) => {
      const target = event.target.closest("[data-hint]");
      if (target) showGlobalHint(target);
    });
    document.addEventListener("focusin", (event) => {
      const target = event.target.closest("[data-hint]");
      if (target) showGlobalHint(target);
    });
    document.addEventListener("mouseout", (event) => {
      if (event.target.closest("[data-hint]")) hideGlobalHint();
    });
    document.addEventListener("focusout", hideGlobalHint);
    document.addEventListener("scroll", hideGlobalHint, true);
    window.addEventListener("resize", hideGlobalHint);

    const observer = new MutationObserver((mutations) => {
      mutations.forEach((mutation) => {
        mutation.addedNodes.forEach((node) => {
          if (node.nodeType === 1) applyButtonHints(node);
        });
      });
    });
    observer.observe(document.body, { childList: true, subtree: true });
  }

  function domainSwap() {
    const currentDomain = document.getElementById("domainSelect")?.value || sessionStorage.getItem("domain") || "dev";

    clearDomainProcessTrail();
    sessionStorage.setItem("domain", currentDomain);
    const url = new URL(window.location);
    url.searchParams.set("domain", currentDomain);
    window.history.replaceState({}, "", url);

    domainUpdate(currentDomain);
  }

  function syncDomainSelect(currentDomain) {
    const select = document.getElementById("domainSelect");
    if (select) select.value = currentDomain || "dev";
  }

  function domainUpdate(currentDomain) {
    syncDomainSelect(currentDomain);
    const domainLabel = currentDomain === "engineer" ? "BUILD" : currentDomain.toUpperCase();
    document.getElementById("domainLabelSidebar").innerHTML = domainLabel;
    document.getElementById("readyLabelSidebar").innerHTML = "READY";

    const logoSet = document.getElementsByClassName("domainLogo");

    document.getElementById("textBlockLogo").style.display = "flex";

    for (const logo of logoSet) {
      logo.src = `../assets/${currentDomain}Logo.svg`;
      logo.href = `../assets/${currentDomain}Logo.svg`;
    }

    document.getElementById("domainCss").href =
      `../assets/${currentDomain}Styles.css`;
    environmentUpdate();
  }

  function clearDomainProcessTrail() {
    const keys = [
      "candidateId",
      "candidateName",
      "candidateEmail",
      "candidateStatus",
      "candidateProfileType",
      "candidateTopMatches",
      "candidateResumeUrl",
      "externalCandidateSource",
      "shortlist",
      "clientEmail",
      "jobID",
      "jobId",
      "selectedJdId",
      "jdId",
      "jobCompany",
      "jobTitle",
      "jobSkills",
      "temporaryProfiles",
      "totalProfiles",
      "recentProfiles",
      "pipelineProfiles",
      "latestScheduleTracking",
    ];
    keys.forEach((key) => sessionStorage.removeItem(key));
  }

  async function environmentUpdate() {
    const host = window.location.host;
    const notice = document.getElementById("environmentNotice");
    const domain = sessionStorage.getItem("domain") || document.getElementById("domainSelect")?.value || "dev";
    const domainName =
      domain === "law"
        ? "Law Domain"
        : domain === "engineer"
          ? "Engineer Domain"
          : "Technology Domain";
    const now = new Date().toLocaleString([], {
      year: "numeric",
      month: "short",
      day: "numeric",
      hour: "numeric",
      minute: "2-digit",
      timeZoneName: "short",
    });

    let environmentName = "Local";
    let sourceName = "Local source";
    let background = "rgba(255, 255, 255, 0.16)";
    let databaseName = "local";
    let databaseHost = "local";
    let storageContainer = "local";
    let publicDomain = host || "localhost";

    if (host.includes("vetcode-production")) {
      environmentName = "Production";
      sourceName = "Production Railway";
      background = "rgba(190, 38, 51, 0.86)";
    } else if (host.includes("vetcode-dev")) {
      environmentName = "Development";
      sourceName = "Development Railway";
      background = "rgba(18, 91, 54, 0.9)";
    }

    try {
      const response = await fetch("/api/environment", { cache: "no-store" });
      if (response.ok) {
        const env = await response.json();
        environmentName = env.environment || environmentName;
        sourceName = env.source || sourceName;
        background = env.badge_color || background;
        databaseName = env.database_name || databaseName;
        databaseHost = env.database_host || databaseHost;
        storageContainer = env.storage_container || storageContainer;
        publicDomain = env.public_domain || publicDomain;
      }
    } catch (error) {
      sourceName = `${sourceName} - backend environment check unavailable`;
    }

    const statusText = [
      `Workspace status`,
      now,
      `Domain: ${domainName}`,
      `Database: ${databaseName}`,
      `DB host: ${databaseHost}`,
      `Storage: ${storageContainer}`,
      `App: ${publicDomain}`,
      `Source: ${sourceName}`,
    ].join("\n");
    notice.innerHTML = `<button class="workspace-status-button" type="button">Workspace status</button>`;
    const button = notice.querySelector("button");
    button.dataset.hint = statusText;
    button.setAttribute("aria-label", statusText);
    button.onclick = () => alert(statusText);
    if (typeof applyButtonHints === "function") applyButtonHints(notice);
  }

  setInterval(environmentUpdate, 60000);
</script>
