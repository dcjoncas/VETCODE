<aside class="sidebar">
  <a id="textBlockLogo" class="brand" href="find-candidate.html" aria-label="Home - Talent">
    <img
      class="domainLogo"
      src="../assets/devLogo.svg"
      alt="DevReady"
      style="width: 42px; height: 42px"
    />
    <div class="title">
      <span id="domainLabelSidebar">DEV</span>
      <span>READY</span>
      <span class="sub">Vetting Workspace</span>
    </div>
  </a>

  <a id="imgLogoLink" class="logo-home" href="find-candidate.html" aria-label="Home - Talent" style="display: none">
    <img
      id="imgLogo"
      src="../assets/lawLogo.png"
      style="width: 100%"
    />
  </a>

  <div class="userbox">
    <a
      href="https://devready.io/contact/"
      target="_blank"
      rel="noopener"
      style="
        display: block;
        margin-bottom: 10px;
        padding: 8px 10px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.92);
        color: #125b36;
        font-size: 12px;
        font-weight: 900;
        text-align: center;
      "
      >Contact DevReady</a
    >
    <div style="font-size: 12px; opacity: 0.9">Welcome back,</div>
    <div class="name">Darrin Joncas</div>
    <div
      id="environmentBadge"
      class="badge"
      style="
        margin-top: 10px;
        width: 100%;
        justify-content: center;
        background: rgba(255, 255, 255, 0.16);
      "
    >
      Environment: Local
    </div>
    <div
      id="environmentNotice"
      style="
        margin-top: 8px;
        padding: 10px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.14);
        color: #fff;
        font-size: 12px;
        line-height: 1.4;
      "
    >
      Loading workspace status...
    </div>
    <div
      class="field"
      style="margin-top: 10px; display: flex; gap: 8px; flex-wrap: wrap"
    >
      <select
        id="domainSelect"
        class="badge"
        style="background: rgba(16, 32, 24, 0.1); color: #f5f7f7"
        onchange="domainSwap()"
      >
        <option value="dev" style="color: black">Technology Domain</option>
        <option value="engineer" style="color: black">Engineer Domain</option>
        <option value="law" style="color: black">Law Domain</option>
      </select>
    </div>
  </div>
  <div id="pageNav"></div>

  <div class="footer">
    DevReady - www.devready.io<br />
    Internal and external candidate workflows
  </div>
</aside>

<script>
  $(function () {
    $("#pageNav").load("components/sideNav.html");

    const select = document.getElementById("domainSelect");

    const params = new URLSearchParams(window.location.search);
    const domainFromUrl = params.get("domain");

    if (domainFromUrl) {
      select.value = domainFromUrl;
      sessionStorage.setItem("domain", domainFromUrl);
    } else {
      const savedDomain = sessionStorage.getItem("domain");
      if (savedDomain) {
        select.value = savedDomain;
      }
    }

    domainUpdate(select.value);
    environmentUpdate();
  });

  function domainSwap() {
    const currentDomain = document.getElementById("domainSelect").value;

    sessionStorage.setItem("domain", currentDomain);
    const url = new URL(window.location);
    url.searchParams.set("domain", currentDomain);
    window.history.replaceState({}, "", url);

    domainUpdate(currentDomain);
  }

  function domainUpdate(currentDomain) {
    document.getElementById("domainLabelSidebar").innerHTML =
      currentDomain.toUpperCase();

    const logoSet = document.getElementsByClassName("domainLogo");

    if (currentDomain == "law") {
      document.getElementById("textBlockLogo").style.display = "none";
      document.getElementById("imgLogoLink").style.display = "block";
    } else {
      document.getElementById("textBlockLogo").style.display = "flex";
      document.getElementById("imgLogoLink").style.display = "none";
    }

    for (const logo of logoSet) {
      logo.src = `../assets/${currentDomain}Logo.svg`;
      logo.href = `../assets/${currentDomain}Logo.svg`;
    }

    document.getElementById("domainCss").href =
      `../assets/${currentDomain}Styles.css`;
    environmentUpdate();
  }

  function environmentUpdate() {
    const host = window.location.host;
    const badge = document.getElementById("environmentBadge");
    const notice = document.getElementById("environmentNotice");
    const domain = sessionStorage.getItem("domain") || document.getElementById("domainSelect")?.value || "dev";
    const domainName =
      domain === "law"
        ? "Law Domain"
        : domain === "engineer"
          ? "Engineer Domain"
          : "Technology Domain";
    const now = new Date().toLocaleString([], {
      year: "numeric",
      month: "short",
      day: "numeric",
      hour: "numeric",
      minute: "2-digit",
      timeZoneName: "short",
    });

    let environmentName = "Local";
    let sourceName = "Local source";
    let background = "rgba(255, 255, 255, 0.16)";

    if (host.includes("vetcode-production")) {
      environmentName = "Production";
      sourceName = "Production Railway";
      background = "rgba(190, 38, 51, 0.86)";
    } else if (host.includes("vetcode-dev")) {
      environmentName = "Development";
      sourceName = "Development Railway";
      background = "rgba(18, 91, 54, 0.9)";
    }

    badge.textContent = `Environment: ${environmentName}`;
    badge.style.background = background;
    notice.innerHTML = `
      <strong>Workspace status</strong><br />
      ${now}<br />
      Database: ${environmentName} ${domainName}<br />
      Source: ${sourceName}
    `;
  }

  setInterval(environmentUpdate, 60000);
</script>
