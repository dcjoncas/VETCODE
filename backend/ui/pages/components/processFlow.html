<script src="JS/updateProcessFlow.js"></script>

<script>
  const currentProcessPath = window.location.pathname.replace(/\/$/, "");
  const processLinks = document.querySelectorAll("#processFlow a");

  processLinks.forEach((link) => {
    const linkPath = new URL(link.href).pathname.replace(/\/$/, "");

    if (currentProcessPath === linkPath) {
      link.classList.add("on");
    }
  });

  updateCandidate();
  updateJob();
</script>
