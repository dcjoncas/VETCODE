<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DevReady • Candidate Chat</title>
    <link
      rel="icon"
      href="../assets/devLogo.svg"
      sizes="any"
      type="image/svg+xml"
    />
    <link id="domainCss" rel="stylesheet" href="../assets/devStyles.css" />
    <script>
      (function () {
        const params = new URLSearchParams(window.location.search);
        const requested = params.get("domain") || sessionStorage.getItem("domain") || "dev";
        const domain = requested === "technology" ? "dev" : (["dev", "engineer", "law"].includes(requested) ? requested : "dev");
        sessionStorage.setItem("domain", domain);
        const css = document.getElementById("domainCss");
        if (css) css.href = `../assets/${domain}Styles.css`;
        document.documentElement.dataset.domain = domain;
      })();
    </script>
    <script src="JS/pageAgents.js?v=20260515-numa-inline-label"></script>
  </head>
  <body>
    <div class="container">
      <aside class="sidebar">
        <div class="brand">
          <img
            id="domainLogoImg"
            src="../assets/devLogo.svg"
            alt="DevReady"
            style="width: 42px; height: 42px"
          />
          <div class="title">
            <span id="domainBrandLabel">DEV</span>
            <span>READY</span>
            <span id="candidateNameSpan" class="sub"
              >Vetting • No Candidate Selected</span
            >
          </div>
        </div>

        <div class="footer">
          DevReady • <a href="/ui/index.html">DevReady home</a>
        </div>
      </aside>

      <main
        class="main"
        style="display: flex; height: 100vh; flex-direction: column"
      >
        <div class="topbar">
          <div class="page-title">DevReady • Candidate Chat</div>
          <div class="breadcrumb">Vetting Process • AI Interview</div>
        </div>

        <div class="chat">
          <div class="head">
            <div>
              <div style="font-weight: 900">DevReady AI</div>
              <small id="chatSubhead">Private + Public profile build</small>
            </div>
            <div
              id="questionProgress"
              style="
                margin-left: auto;
                text-align: right;
                font-size: 12px;
                font-weight: 900;
                color: var(--muted);
              "
            >
              Loading questions...
            </div>
          </div>
          <div
            style="
              height: 8px;
              background: rgba(0, 0, 0, 0.08);
              border-radius: 999px;
              overflow: hidden;
            "
          >
            <div
              id="questionProgressBar"
              style="
                width: 0%;
                height: 100%;
                background: var(--primary);
                transition: width 0.2s ease;
              "
            ></div>
          </div>
          <div id="chatWindow" class="msgs"></div>
          <form class="send">
            <input
              id="msgInput"
              class="input"
              style="min-width: 0; flex: 1"
              placeholder="Type a message…"
              autocomplete="off"
            />
            <button id="sendBtn" class="btn" type="submit" disabled>
              Send
            </button>
            <button id="saveProgressBtn" class="btn secondary" type="button" disabled>
              Save progress
            </button>
          </form>
        </div>
      </main>
    </div>

    <script src="JS/apiScripts.js"></script>
    <script>
      const queryString = window.location.search;
      const urlParams = new URLSearchParams(queryString);

      const query = urlParams.get("query");
      const candidate = urlParams.get("candidate") || null;
      const currentDomain = urlParams.get("domain") || "dev";
      document.getElementById("domainCss").href = `../assets/${currentDomain}Styles.css`;
      const logoImg = document.getElementById("domainLogoImg");
      if (logoImg) logoImg.src = `../assets/${currentDomain}Logo.svg`;
      const brandLabel = document.getElementById("domainBrandLabel");
      if (brandLabel) {
        brandLabel.textContent = currentDomain === "engineer" ? "BUILD" : currentDomain.toUpperCase();
      }

      const chatWindow = document.getElementById("chatWindow");
      let chatTranscript = [];

      let userName = "";
      let surveyId = "";
      let questionNumber = 1;
      let maxQuestions = 100;
      let isSending = false;
      let chatComplete = false;

      // Add new messages to the chat
      function appendMessage(sender, message) {
        const chatMsg = document.createElement("div");
        chatMsg.classList.add("bubble");

        if (sender === "DevReady AI") chatMsg.classList.add("ai");
        else chatMsg.classList.add("me");

        chatMsg.innerHTML = `<strong>${sender}:</strong> ${message}`;

        chatWindow.appendChild(chatMsg);
      }

      function latestQuestionNumber() {
        let latest = 0;
        chatTranscript.forEach((row) => {
          if (row.role !== "assistant") return;
          const match = String(row.content || "").match(/Question\s+(\d+)\s*:/i);
          if (match) latest = Math.max(latest, Number(match[1]) || 0);
        });
        return latest;
      }

      function lastMessageIsCompletion() {
        const last = chatTranscript[chatTranscript.length - 1];
        return (
          last &&
          last.role === "assistant" &&
          /profile chat is complete/i.test(String(last.content || ""))
        );
      }

      function answeredCount() {
        const total = maxQuestions || 0;
        if (lastMessageIsCompletion()) return total;

        const latest = latestQuestionNumber();
        if (!latest) return 0;

        const last = chatTranscript[chatTranscript.length - 1];
        const answered = last && last.role === "user" ? latest : latest - 1;
        return Math.min(Math.max(answered, 0), total);
      }

      function nextQuestionNumber() {
        return latestQuestionNumber() + 1 || 1;
      }

      function updateProgress() {
        const progress = document.getElementById("questionProgress");
        const bar = document.getElementById("questionProgressBar");
        const subhead = document.getElementById("chatSubhead");
        const sendButton = document.getElementById("sendBtn");
        const saveButton = document.getElementById("saveProgressBtn");
        const input = document.getElementById("msgInput");
        const total = maxQuestions || 0;
        const answered = answeredCount();
        const remaining = Math.max(total - answered, 0);
        const percent = total ? Math.round((answered / total) * 100) : 0;

        chatComplete = total > 0 && answered >= total;
        if (progress) {
          progress.textContent = chatComplete
            ? `Complete • ${answered}/${total}`
            : `Question ${Math.min(answered + 1, total)}/${total} • ${remaining} left`;
        }
        if (bar) bar.style.width = `${percent}%`;
        if (subhead) {
          subhead.textContent = chatComplete
            ? "Profile chat complete"
            : `${remaining} question${remaining === 1 ? "" : "s"} remaining`;
        }
        if (chatComplete) {
          if (input) {
            input.value = "";
            input.disabled = true;
            input.placeholder = "This profile chat is complete.";
          }
          if (sendButton) sendButton.disabled = true;
          if (saveButton) saveButton.disabled = false;
        }
        if (!chatComplete && saveButton) saveButton.disabled = answered <= 0;
      }

      async function getChatHistory() {
        const chatHistory = await api(`/api/chat/getChat/${candidate}?domain=${encodeURIComponent(currentDomain)}`, {
          method: "GET",
        });

        userName = chatHistory.firstName;
        surveyId = chatHistory.surveyId;
        maxQuestions = chatHistory.questionCount;

        document.getElementById("candidateNameSpan").innerHTML =
          `Vetting • ${chatHistory.firstName} ${chatHistory.lastName}`;

        chatTranscript = chatHistory.aiTranscript;

        chatTranscript.forEach((row, i) => {
          if (row.role === "assistant")
            appendMessage("DevReady AI", row.content);
          else appendMessage(userName, row.content);
        });

        questionNumber = nextQuestionNumber();
        updateProgress();

        document.getElementById("sendBtn").disabled = chatComplete;
      }

      async function saveProgress() {
        const saveButton = document.getElementById("saveProgressBtn");
        saveButton.disabled = true;
        const fd = new FormData();
        fd.append("transcript", JSON.stringify(chatTranscript));
        fd.append("candidateName", userName);
        fd.append("chatUrl", candidate);
        fd.append("domain", currentDomain);

        try {
          const result = await api("/api/chat/saveProgress", {
            method: "POST",
            body: fd,
          });
          appendMessage("DevReady AI", result.recentMessage || "Progress saved to your profile.");
          chatTranscript = result.aiTranscript || chatTranscript;
          updateProgress();
        } catch (error) {
          appendMessage("DevReady AI", "Sorry, I could not save progress. Please wait a moment and try again.");
          console.error(error);
        } finally {
          saveButton.disabled = answeredCount() <= 0;
        }
      }

      async function sendMessage() {
        if (isSending || chatComplete) return;
        const input = document.getElementById("msgInput");
        const sendButton = document.getElementById("sendBtn");
        const userMsg = input.value.trim();
        if (!userMsg) return;

        isSending = true;
        sendButton.disabled = true;
        input.disabled = true;
        document.getElementById("msgInput").value = "";

        appendMessage(userName, userMsg);

        chatTranscript.push({ role: "user", content: userMsg });

        const fd = new FormData();
        fd.append("transcript", JSON.stringify(chatTranscript));
        fd.append("candidateName", userName);
        fd.append("chatUrl", candidate);
        fd.append("domain", currentDomain);

        let aiResponse = {};

        try {
          if (questionNumber <= maxQuestions + 1) {
            aiResponse = await api(`/api/chat/sendChat/${questionNumber}`, {
              method: "POST",
              body: fd,
            });
          } else {
            aiResponse = {
              answered: false,
              recentMessage:
                "Thanks, your DevReady profile chat is complete. Our team will review the completed profile and follow up with next steps.",
              aiTranscript: chatTranscript,
            };
          }

          // Add AI response and replace old transcript
          appendMessage("DevReady AI", aiResponse.recentMessage);
          chatTranscript = aiResponse.aiTranscript;
          questionNumber = nextQuestionNumber();
          updateProgress();
        } catch (error) {
          appendMessage(
            "DevReady AI",
            "Sorry, I could not save that answer. Please wait a moment and try again."
          );
          console.error(error);
        } finally {
          isSending = false;
          if (!chatComplete) {
            input.disabled = false;
            sendButton.disabled = false;
            input.focus();
          }
        }
      }

      document.addEventListener("DOMContentLoaded", () => {
        document
          .querySelector(".send")
          .addEventListener("submit", async (event) => {
            event.preventDefault();
            await sendMessage();
          });
        document
          .getElementById("saveProgressBtn")
          .addEventListener("click", saveProgress);
        getChatHistory();
      });
    </script>
  </body>
</html>
