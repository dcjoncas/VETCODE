<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DevReady - Badge Catalog</title>
    <link
      class="domainLogo"
      rel="icon"
      href="../assets/devLogo.svg"
      sizes="any"
      type="image/svg+xml"
    />
    <link id="domainCss" rel="stylesheet" href="../assets/devStyles.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script>
      $(function () {
        $("#siteSidebar").load("components/sidebar.html");
        $("#processFlow").load("components/processFlow.html");
        $("#searchBar").load("components/searchBar.html");
      });
    </script>
    <style>
      .badge-hero {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 16px;
        align-items: center;
        padding: 18px;
        border: 1px solid var(--line);
        border-radius: 16px;
        background:
          linear-gradient(135deg, rgba(23, 105, 224, 0.1), rgba(45, 125, 70, 0.1)),
          #fff;
      }

      .badge-hero h1 {
        margin: 0;
        font-size: 28px;
        letter-spacing: 0;
      }

      .badge-hero p {
        margin: 6px 0 0;
        max-width: 780px;
        color: var(--muted);
      }

      .badge-filter {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }

      .badge-filter button.active {
        background: var(--primary);
        color: #fff;
        border-color: var(--primary);
      }

      .badge-board {
        display: grid;
        gap: 14px;
        margin-top: 16px;
      }

      .role-lane {
        border: 1px solid var(--line);
        border-radius: 16px;
        background: #fff;
        overflow: hidden;
      }

      .role-lane-header {
        display: grid;
        grid-template-columns: minmax(190px, 0.25fr) minmax(0, 1fr);
        gap: 12px;
        align-items: center;
        padding: 14px;
        border-bottom: 1px solid var(--line);
        background: #f8faf9;
      }

      .role-name {
        display: flex;
        gap: 10px;
        align-items: center;
      }

      .role-mark {
        width: 42px;
        height: 42px;
        border-radius: 14px;
        display: grid;
        place-items: center;
        color: #fff;
        font-weight: 900;
        box-shadow: 0 12px 22px rgba(24, 37, 58, 0.12);
      }

      .role-name h2 {
        margin: 0;
        font-size: 17px;
      }

      .role-name span {
        color: var(--muted);
        font-size: 12px;
      }

      .progress-rail {
        display: grid;
        grid-template-columns: repeat(10, minmax(54px, 1fr));
        gap: 6px;
      }

      .rail-step {
        height: 6px;
        border-radius: 999px;
        opacity: 0.85;
      }

      .badge-grid {
        display: grid;
        grid-template-columns: repeat(10, minmax(96px, 1fr));
        gap: 8px;
        padding: 12px;
      }

      .badge-card {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: linear-gradient(180deg, #fff, #f7faf8);
        padding: 10px;
        min-height: 216px;
        text-align: left;
        transition:
          transform 0.16s ease,
          box-shadow 0.16s ease,
          border-color 0.16s ease;
      }

      .badge-card:hover {
        transform: translateY(-2px);
        box-shadow: 0 14px 26px rgba(24, 37, 58, 0.13);
        border-color: rgba(23, 105, 224, 0.42);
      }

      .badge-symbol {
        position: relative;
        width: 58px;
        height: 58px;
        margin-bottom: 9px;
      }

      .badge-shield {
        position: absolute;
        inset: 0;
        clip-path: polygon(50% 0, 88% 14%, 82% 70%, 50% 100%, 18% 70%, 12% 14%);
        display: grid;
        place-items: center;
        color: #fff;
        box-shadow:
          inset 0 -10px 18px rgba(0, 0, 0, 0.16),
          0 10px 18px rgba(24, 37, 58, 0.16);
      }

      .cert-icon {
        width: 34px;
        height: 34px;
        filter: drop-shadow(0 2px 2px rgba(0, 0, 0, 0.14));
      }

      .cert-icon .paper {
        fill: rgba(255, 255, 255, 0.96);
      }

      .cert-icon .line {
        stroke: rgba(31, 41, 51, 0.42);
        stroke-width: 1.7;
        stroke-linecap: round;
      }

      .cert-icon .seal {
        fill: #f2c94c;
        stroke: rgba(95, 71, 0, 0.28);
        stroke-width: 1;
      }

      .cert-icon .ribbon {
        fill: #2f8f4e;
      }

      .badge-clock {
        position: absolute;
        right: -4px;
        bottom: -4px;
        width: 22px;
        height: 22px;
        border-radius: 999px;
        background: #fff;
        border: 2px solid #d4af37;
        box-shadow: 0 5px 12px rgba(24, 37, 58, 0.14);
      }

      .badge-clock::before,
      .badge-clock::after {
        content: "";
        position: absolute;
        left: 9px;
        top: 4px;
        width: 2px;
        height: 8px;
        border-radius: 999px;
        background: #2f5f4a;
        transform-origin: bottom center;
      }

      .badge-clock::after {
        top: 9px;
        height: 6px;
        transform: rotate(90deg);
      }

      .badge-ticks {
        display: grid;
        grid-template-columns: repeat(10, 1fr);
        gap: 3px;
        margin-top: 9px;
      }

      .badge-tick {
        height: 6px;
        border-radius: 999px;
        background: #e2b93b;
        border: 1px solid rgba(98, 78, 21, 0.16);
      }

      .badge-tick.complete {
        background: #2f8f4e;
        border-color: rgba(18, 91, 54, 0.28);
      }

      .badge-card strong {
        display: block;
        line-height: 1.15;
        font-size: 13px;
      }

      .badge-card small {
        display: block;
        margin-top: 6px;
        color: var(--muted);
        font-size: 11px;
        line-height: 1.25;
      }

      .badge-card .level {
        display: inline-flex;
        margin-top: 8px;
        padding: 3px 7px;
        border-radius: 999px;
        background: rgba(23, 105, 224, 0.1);
        color: #124d9f;
        font-size: 11px;
        font-weight: 900;
      }

      .badge-card .status-note {
        color: #7a661f;
        font-size: 11px;
        line-height: 1.2;
        margin-top: 6px;
      }

      .exam-version-list {
        display: grid;
        gap: 5px;
        margin-top: 9px;
      }

      .exam-version-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto auto;
        gap: 5px;
        align-items: center;
        padding: 5px;
        border: 1px solid rgba(125, 143, 164, 0.22);
        border-radius: 9px;
        background: rgba(255, 255, 255, 0.72);
      }

      .exam-version-row span {
        font-size: 11px;
        font-weight: 900;
        color: var(--text);
        overflow-wrap: anywhere;
      }

      .exam-version-row .exam-code {
        display: block;
        color: var(--muted);
        font-size: 10px;
        font-weight: 800;
        margin-top: 2px;
      }

      .exam-version-row .start-link,
      .exam-version-row .key-link {
        border-radius: 999px;
        padding: 4px 7px;
        text-decoration: none;
        font-size: 11px;
        font-weight: 900;
      }

      .exam-version-row .start-link {
        background: linear-gradient(180deg, rgba(47, 143, 78, 0.16), rgba(47, 143, 78, 0.08));
        border: 1px solid rgba(47, 143, 78, 0.32);
        color: #125b36;
      }

      .exam-version-row .key-link {
        background: linear-gradient(180deg, rgba(242, 201, 76, 0.2), rgba(242, 201, 76, 0.1));
        border: 1px solid rgba(184, 134, 11, 0.3);
        color: #5f4700;
      }

      @media (max-width: 1180px) {
        .badge-grid,
        .progress-rail {
          grid-template-columns: repeat(5, minmax(110px, 1fr));
        }

        .role-lane-header {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 720px) {
        .badge-hero {
          grid-template-columns: 1fr;
        }

        .badge-grid,
        .progress-rail {
          grid-template-columns: repeat(2, minmax(120px, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div id="siteSidebar"></div>

      <main class="main">
        <div class="topbar">
          <div>
            <div class="page-title">Badge Catalog</div>
            <div class="breadcrumb">Certification paths - role progression</div>
          </div>
          <div id="searchBar"></div>
        </div>

        <div id="processFlow"></div>

        <section class="badge-hero">
          <div>
            <h1>View Badges</h1>
            <p>
              Pick a role path, then choose the badge level you want the candidate to attempt. Each path has 10 progressive badges and opens the AI certification test with that badge selected.
            </p>
          </div>
          <div class="badge-filter" id="domainFilters" aria-label="Badge domain filters"></div>
        </section>

        <section id="badgeBoard" class="badge-board" aria-label="Badge role paths"></section>
      </main>
    </div>

    <script>
      const badgeLevels = [
        ["L1", "Foundations", "Core vocabulary and safe usage."],
        ["L2", "Practitioner", "Applies tools to everyday work."],
        ["L3", "Builder", "Creates useful repeatable workflows."],
        ["L4", "Workflow", "Connects tools to team process."],
        ["L5", "Automation", "Designs reliable assisted automation."],
        ["L6", "Quality", "Evaluates output, risk, and accuracy."],
        ["L7", "Integration", "Connects AI into systems and data."],
        ["L8", "Lead", "Guides teams and reviews AI-enabled work."],
        ["L9", "Architect", "Designs governance, scale, and controls."],
        ["L10", "Principal", "Owns strategy, standards, and outcomes."],
      ];

      const badgeRoles = [
        { domain: "Technology", key: "frontend", name: "Frontend", short: "FE", color: "#1769e0", focus: "UI, accessibility, design systems, and client-side AI." },
        { domain: "Technology", key: "backend", name: "Backend", short: "BE", color: "#125b36", focus: "APIs, services, reliability, and AI-assisted server workflows." },
        { domain: "Technology", key: "fullstack", name: "Full Stack", short: "FS", color: "#6f42c1", focus: "End-to-end delivery across UI, API, data, and deployment." },
        { domain: "Technology", key: "data", name: "Data", short: "DA", color: "#0f766e", focus: "Data modeling, analysis, pipelines, and AI-ready datasets." },
        { domain: "Technology", key: "ai", name: "AI / ML", short: "AI", color: "#b42318", focus: "Prompting, evaluation, model workflows, and responsible AI." },
        { domain: "Technology", key: "devops", name: "Cloud / DevOps", short: "DO", color: "#475569", focus: "Cloud, CI/CD, observability, and operational readiness." },
        { domain: "Technology", key: "qa", name: "QA / Testing", short: "QA", color: "#ca8a04", focus: "Test design, automation, verification, and quality controls." },
        { domain: "Technology", key: "mobile", name: "Mobile", short: "MO", color: "#2563eb", focus: "Mobile delivery, app workflows, and device-ready AI patterns." },
        { domain: "Technology", key: "product", name: "Product / PM", short: "PM", color: "#7c3aed", focus: "Discovery, requirements, roadmap thinking, and AI product operations." },
        { domain: "Technology", key: "security", name: "Security", short: "SE", color: "#991b1b", focus: "Risk, privacy, secure delivery, and AI governance." },
        { domain: "Engineer", key: "buildready-engineer", name: "BuildReady Engineer", short: "BR", color: "#1d4ed8", focus: "Engineering delivery, field workflows, systems, and build readiness." },
        { domain: "Law", key: "lawready", name: "LawReady", short: "LR", color: "#334155", focus: "Legal operations, review workflows, evidence handling, and client readiness." },
      ];

      let selectedDomain = "All";

      function selectedCandidateParams() {
        const params = new URLSearchParams(window.location.search);
        const candidate = params.get("candidate") || sessionStorage.getItem("candidateName") || "";
        const email = params.get("email") || sessionStorage.getItem("candidateEmail") || "";
        const profileId = params.get("profileId") || sessionStorage.getItem("candidateId") || "";
        return { candidate, email, profileId };
      }

      const examVersions = ["A", "B", "C"];

      function badgeId(role, level, version = "") {
        return `${role.key}-${level[0].toLowerCase()}${version ? "-v" + version.toLowerCase() : ""}`;
      }

      function examId(role, level, version) {
        return `${role.key}-${level[0].toLowerCase()}-exam-${version.toLowerCase()}`;
      }

      function examParams(role, level, version) {
        const candidate = selectedCandidateParams();
        const params = new URLSearchParams();
        if (candidate.profileId) params.set("profileId", candidate.profileId);
        if (candidate.candidate) params.set("candidate", candidate.candidate);
        if (candidate.email) params.set("email", candidate.email);
        params.set("badgeRole", role.name);
        params.set("badgeRoleKey", role.key);
        params.set("badgeLevel", level[0]);
        params.set("badgeTitle", `${role.name} ${level[0]} - ${level[1]}`);
        params.set("examVersion", version);
        params.set("examId", examId(role, level, version));
        params.set("certificateId", badgeId(role, level, version));
        return params;
      }

      function startBadge(roleKey, levelIndex, version) {
        const role = badgeRoles.find((item) => item.key === roleKey);
        const level = badgeLevels[levelIndex];
        if (!role || !level) return;

        window.location.href = `ai-cert.html?${examParams(role, level, version).toString()}`;
      }

      function answerKeyUrl(role, level, version) {
        return `exam-answer-key.html?${examParams(role, level, version).toString()}`;
      }

      function renderFilters() {
        const domains = ["All", ...Array.from(new Set(badgeRoles.map((role) => role.domain)))];
        document.getElementById("domainFilters").innerHTML = domains
          .map(
            (domain) =>
              `<button class="btn secondary${domain === selectedDomain ? " active" : ""}" type="button" onclick="selectedDomain='${domain}'; renderFilters(); renderBadges();">${domain}</button>`,
          )
          .join("");
      }

      function renderBadges() {
        const roles = badgeRoles.filter((role) => selectedDomain === "All" || role.domain === selectedDomain);
        document.getElementById("badgeBoard").innerHTML = roles
          .map((role) => {
            const rail = badgeLevels
              .map((_, index) => `<span class="rail-step" style="background:${role.color}; opacity:${0.25 + index * 0.07}"></span>`)
              .join("");
            const cards = badgeLevels
              .map(
                (level, index) => `
                  <article class="badge-card" data-hint="Choose Version A, B, or C for ${role.name} ${level[0]}.">
                    <span class="badge-symbol" aria-hidden="true">
                      <span class="badge-shield" style="background:${role.color}">
                        <svg class="cert-icon" viewBox="0 0 48 48" role="img" aria-label="Certificate badge">
                          <path class="paper" d="M13 6h17l8 8v25H13z"></path>
                          <path class="paper" d="M30 6v8h8"></path>
                          <path class="line" d="M18 18h12M18 24h9M18 30h7"></path>
                          <circle class="seal" cx="32" cy="31" r="5"></circle>
                          <path class="ribbon" d="M29 35l-2 7 5-3 5 3-2-7z"></path>
                        </svg>
                      </span>
                      <span class="badge-clock"></span>
                    </span>
                    <strong>${role.name}<br />${level[1]}</strong>
                    <small>${level[2]}</small>
                    <span class="badge-ticks">${badgeLevels
                      .map((_, tickIndex) => `<span class="badge-tick${tickIndex <= index ? " complete" : ""}"></span>`)
                      .join("")}</span>
                    <span class="level">Badge ${index + 1} of 10</span>
                    <div class="status-note">${index + 1} green level tick${index === 0 ? "" : "s"}; yellow ticks remain.</div>
                    <div class="exam-version-list">
                      ${examVersions
                        .map((version) => {
                          const examCode = examId(role, level, version);
                          const examLabel = `${level[0]}-${version}`;
                          return `
                            <div class="exam-version-row">
                              <span>
                                Exam ${examLabel}
                                <small class="exam-code">${examCode}</small>
                              </span>
                              <a class="start-link" href="ai-cert.html?${examParams(role, level, version).toString()}">Start ${examLabel}</a>
                              <a class="key-link" href="${answerKeyUrl(role, level, version)}" target="_blank" rel="noopener">Answer key ${examLabel}</a>
                            </div>
                          `;
                        })
                        .join("")}
                    </div>
                  </article>
                `,
              )
              .join("");

            return `
              <article class="role-lane">
                <div class="role-lane-header">
                  <div class="role-name">
                    <span class="role-mark" style="background:${role.color}">${role.short}</span>
                    <div>
                      <h2>${role.name}</h2>
                      <span>${role.domain} path - ${role.focus}</span>
                    </div>
                  </div>
                  <div class="progress-rail" aria-hidden="true">${rail}</div>
                </div>
                <div class="badge-grid">${cards}</div>
              </article>
            `;
          })
          .join("");
      }

      renderFilters();
      renderBadges();
    </script>
  </body>
</html>
