<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title id="profilePageTitle">DevReady • Screen 4 — Profile Preview</title>
  <link rel="stylesheet" href="../assets/styles.css"/>
  <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
  <script> 
    $(function(){
      $("#siteSidebar").load("components/sidebar.html");
      $("#processFlow").load("components/processFlow.html");
      $("#searchBar").load("components/searchBar.html");
    });
  </script> 
</head>
<body>
  <div class="container">
    <div id="siteSidebar"></div>

    <main class="main">
      <div class="topbar">
        <div>
          <div id="pageTitle" class="page-title">Search Results</div>
          <div class="breadcrumb">Vetting Process • Profile Search</div>
        </div>
        <div id="searchBar"></div>
      </div>

      <div id="processFlow"></div>

      <!--<div class="grid">-->
        <section class="card">
          


  <script src="JS/apiScripts.js"></script>

  <script>
    const queryString = window.location.search;
    const urlParams = new URLSearchParams(queryString);

    const query = urlParams.get('query');
    const page = parseInt(urlParams.get('page')) || 1;
    const pageLimit = parseInt(urlParams.get('pageLimit')) || 10;

    async function fetchSearchResults() {
        try {
            const fd = new FormData();
            fd.append("domain", "technology");
            fd.append("search_string", query);
            fd.append("currentPage", page);
            fd.append("pageLimit", pageLimit);

            const countResponse = await fetch("/api/profile/pageCount", {
                method: "POST",
                body: fd
            });

            const countResults = await countResponse.json();
            console.log(countResults); // For demo purposes, log the results
            // Here you would typically update the UI with the search results

            const pageResponse = await fetch("/api/profile/pageSearch", {
                method: "POST",
                body: fd
            });

            const pageResults = await pageResponse.json();
            console.log(pageResults); // For demo purposes, log the results
            // Here you would typically update the UI with the search results
        } catch (error) {
            console.error("Error fetching search results:", error);
        }
    }

    fetchSearchResults();
  </script>
</body>
</html>
