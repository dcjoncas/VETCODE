    <script src="JS/apiScripts.js"></script>
    <script>
      const candidateName = sessionStorage.getItem("candidateName");
      const candidateStatus = sessionStorage.getItem("candidateStatus");
      const candidateId = sessionStorage.getItem("candidateId");
      const chatWindow = document.getElementById("chatWindow");
      let chatTranscript = [];

      // tiny UX sugar (mock only)
      document
        .querySelectorAll("a.step")
        .forEach((a) => a.addEventListener("click", () => {}));

      async function scheduleAiChat() {
        const fd = new FormData();
        fd.append("profileid", candidateId);

        const result = await api("/api/chat/scheduleChat", {
          method: "POST",
          body: fd,
        });
        const urlString = `${window.location.host}/ui/pages/external-chat.html?candidate=${result}`;

        console.log(urlString);

        document.getElementById("chatUrl").innerHTML =
          `AI Chat Link: <a href='http://${urlString}'>${urlString}</a>`;
      }

      function appendMessage(sender, message) {
        const chatMsg = document.createElement("div");
        chatMsg.classList.add("bubble");

        if (sender === "DevReady AI") chatMsg.classList.add("me");
        else chatMsg.classList.add("ai");

        chatMsg.innerHTML = `<strong>${sender}:</strong> ${message}`;

        chatWindow.appendChild(chatMsg);
      }

      async function getChatHistory() {
        const chatUrlCode = await api(`/api/chat/getUrlCode/${candidateId}`, {
          method: "GET",
        });

        if (!chatUrlCode) return;

        const urlString = `${window.location.host}/ui/pages/external-chat.html?candidate=${chatUrlCode}`;

        document.getElementById("chatUrl").innerHTML =
          `AI Chat Link: <a href='http://${urlString}'>${urlString}</a>`;

        const chatHistory = await api(`/api/chat/getChat/${chatUrlCode}`, {
          method: "GET",
        });

        if (!chatHistory) return;

        document.getElementById("candidateNameSpan").innerHTML =
          `Vetting • ${chatHistory.firstName} ${chatHistory.lastName} - AI Interview`;

        chatTranscript = chatHistory.aiTranscript;

        // Do not show the chat if only the initial AI message is present.
        if (chatTranscript.length < 2) {
          return;
        }

        document.getElementById("msgWindowHeader").innerHTML = "DevReady AI";
        chatWindow.hidden = false;

        chatTranscript.forEach((row, i) => {
          if (row.role === "assistant")
            appendMessage("DevReady AI", row.content);
          else appendMessage(chatHistory.firstName, row.content);
        });
      }

      document.addEventListener("DOMContentLoaded", function () {
        if (candidateName) {
          document.getElementById("candidateName").innerText =
            `${candidateName}`;
        } else {
          document.getElementById("candidateName").innerText =
            "No Candidate Selected";
        }

        if (candidateStatus) {
          document.getElementById("candidateStatus").innerText =
            `${candidateStatus}`;
        } else {
          document.getElementById("candidateStatus").innerText =
            "No Candidate Selected";
        }

        document
          .getElementById("scheduleButton")
          .addEventListener("click", scheduleAiChat);

        getChatHistory();
      });
    </script>
