<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DevReady • Interview Scheduling</title>
    <link
      class="domainLogo"
      rel="icon"
      href="../assets/devLogo.svg"
      sizes="any"
      type="image/svg+xml"
    />
    <link id="domainCss" rel="stylesheet" href="../assets/devStyles.css" />
    <script src="https://assets.calendly.com/assets/external/widget.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script>
      $(function () {
        $("#siteSidebar").load("components/sidebar.html");
        $("#processFlow").load("components/processFlow.html");
        $("#searchBar").load("components/searchBar.html");
      });
    </script>
  </head>
  <body>
    <div class="container">
      <div id="siteSidebar"></div>

      <main class="main">
        <div class="topbar">
          <div>
            <div class="page-title">Interview Scheduling</div>
            <div class="breadcrumb">Vetting Process • Scheduling</div>
          </div>
          <div id="searchBar"></div>
        </div>

        <div id="processFlow"></div>

        <section class="card">
          <div class="split">
            <div>
              <h2 style="margin-top: 0">Availability</h2>
              <div
                class="calendly-inline-widget"
                data-url="https://calendly.com/mitch-blake-devready/discovery-call"
                style="min-width: 320px; height: 700px"
              ></div>
            </div>

            <div>
              <div
                class="card"
                style="padding: 14px; border-radius: 18px; box-shadow: none"
              >
                <div id="shortlistCount" style="font-weight: 900">
                  Shortlist
                </div>
                <table class="table" style="margin-top: 10px">
                  <thead>
                    <tr>
                      <th>Candidate</th>
                      <th>Score</th>
                      <th>Email</th>
                      <th></th>
                      <th></th>
                    </tr>
                  </thead>
                  <tbody id="shortlistBody"></tbody>
                </table>
              </div>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="JS/apiScripts.js"></script>
    <script>
      let shortlistArray = [];
      // Used to store an array of JSON objects containing candidate scores
      let shortlistScores = [];

      // tiny UX sugar (mock only)
      document
        .querySelectorAll("a.step")
        .forEach((a) => a.addEventListener("click", () => {}));

      function openProfile(profileId, firstName, lastName, step) {
        sessionStorage.setItem("candidateId", profileId);
        sessionStorage.setItem("candidateName", firstName + " " + lastName);
        sessionStorage.setItem("candidateStatus", step);

        window.location.href = "profile-preview.html";
      }

      function removeProfile(profileId) {
        shortlistArray = shortlistArray.filter(
          (candidate) => candidate !== profileId,
        );

        shortlistScores = shortlistScores.filter(
          (candidate) => candidate.id !== profileId,
        );

        sessionStorage.setItem("shortlist", shortlistArray);

        document.getElementById("candidate" + profileId).remove();
      }

      function bookCandidate(candidateName, candidateEmail) {
        const url = `https://calendly.com/mitch-blake-devready/discovery-call?name=${encodeURIComponent(candidateName)}&email=${encodeURIComponent(candidateEmail)}`;
        console.log(url);

        Calendly.initPopupWidget({ url });
      }

      document.addEventListener("DOMContentLoaded", async () => {
        const shortlist = sessionStorage.getItem("shortlist");
        const jobId = sessionStorage.getItem("jobID");

        if (shortlist && shortlist.length > 0) {
          shortlistArray = shortlist.split(",");
          document.getElementById("shortlistCount").innerText =
            `Shortlist (Top ${shortlistArray.length})`;

          const shortlistTable = document.getElementById("shortlistBody");

          console.log(jobId);

          if (!jobId || jobId.length < 1) {
            shortlistArray.forEach(async (candidate) => {
              try {
                const profileData = await api(
                  `/api/azure/getProfile/short/${candidate}`,
                );

                console.log(profileData);

                shortlistTable.insertAdjacentHTML(
                  "beforeend",
                  `<tr id="candidate${candidate}">
                    <td><strong>${profileData.firstName} ${profileData.lastName}</strong></td>
                    <td>Job Missing</td>
                    <td>${profileData.email}</td>
                    <td>
                      <button
                        class="btn secondary"
                        style="padding: 8px 12px"
                        onclick="openProfile('${candidate}','${profileData.firstName}','${profileData.lastName}','${profileData.status}')"
                      >
                        Open
                      </button>
                    </td>
                    <td>
                      <a href="https://calendly.com/mitch-blake-devready/discovery-call?name=${encodeURIComponent(profileData.firstName + " " + profileData.lastName)}&email=${encodeURIComponent(profileData.email)}" target="_blank">
                      <button
                        class="btn"
                        style="padding: 8px 12px"
                      >
                        Book Interview
                      </button>
                    </td>
                  </tr>`,
                );
              } catch (error) {
                console.log(error);

                console.log("Could not find candidate with ID " + candidate);
              }
            });
          } else {
            const fd = new FormData();
            fd.append("profileIds", shortlist);

            const profileData = await api(
              `/api/azure/getProfile/short/score/${jobId}`,
              { method: "POST", body: fd },
            );

            console.log(profileData);

            // TODO: Work out candidate scores
            profileData.forEach((candidate) => {
              shortlistScores.push({
                id: candidate.id,
                name: candidate.firstName + candidate.lastName,
                score: candidate.score + "%",
              });

              shortlistTable.insertAdjacentHTML(
                "beforeend",
                `<tr id="candidate${candidate.id}">
                    <td><strong>${candidate.firstName} ${candidate.lastName}</strong></td>
                    <td>${candidate.score * 10}</td>
                    <td>${candidate.email}</td>
                    <td>
                      <button
                        class="btn secondary"
                        style="padding: 8px 12px"
                        onclick="openProfile('${candidate.id}','${candidate.firstName}','${candidate.lastName}','${candidate.status}')"
                      >
                        Open
                      </button>
                    </td>
                    <td>
                      <a href="https://calendly.com/mitch-blake-devready/discovery-call?name=${encodeURIComponent(candidate.firstName + " " + candidate.lastName)}&email=${encodeURIComponent(candidate.email)}" target="_blank">
                        <button
                          class="btn"
                          style="padding: 8px 12px"
                        >
                          Book Interview
                        </button>
                      </a>
                    </td>
                  </tr>`,
              );
            });
          }
        }
      });
    </script>
  </body>
</html>
