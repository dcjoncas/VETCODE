<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DevReady • Client Communication</title>
    <link
      class="domainLogo"
      rel="icon"
      href="../assets/devLogo.svg"
      sizes="any"
      type="image/svg+xml"
    />
    <link id="domainCss" rel="stylesheet" href="../assets/devStyles.css" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script>
      $(function () {
        $("#siteSidebar").load("components/sidebar.html");
        $("#processFlow").load("components/processFlow.html");
        $("#searchBar").load("components/searchBar.html");
      });
    </script>
  </head>
  <body>
    <div class="container">
      <div id="siteSidebar"></div>

      <main class="main">
        <div class="topbar">
          <div>
            <div class="page-title">Client Communication</div>
            <div class="breadcrumb">Vetting Process • Client Review</div>
          </div>
          <div id="searchBar"></div>
        </div>

        <div id="processFlow"></div>

        <section class="card">
          <h2>Communicate to the end client (shortlist + rationale)</h2>
          <p>
            Package the Top 10 shortlist into a clean client message, include
            evidence, and manage approvals and next steps.
          </p>

          <div class="split">
            <div class="field">
              <label>Client message (draft)</label>
              <textarea id="emailArea"></textarea>
              <div class="row-actions">
                <button class="btn" type="button" onclick="sendEmail()">
                  Send to Client
                </button>
                <button
                  class="btn secondary"
                  type="button"
                  onclick="generateEmail()"
                >
                  Generate Email
                </button>
                <button class="btn secondary" type="button" hidden>
                  Generate variant
                </button>
                <button
                  class="btn secondary"
                  type="button"
                  onclick="attachProfileLinks()"
                >
                  Attach profiles
                </button>
              </div>
            </div>

            <div>
              <h2 id="shortlistCount" style="margin-top: 0">Shortlist</h2>
              <table class="table">
                <thead>
                  <tr>
                    <th>Candidate</th>
                    <th>Score</th>
                    <th>Status</th>
                    <th></th>
                    <th></th>
                  </tr>
                </thead>
                <tbody id="shortlistBody"></tbody>
              </table>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script src="JS/apiScripts.js"></script>
    <script>
      let shortlistArray = [];
      // Used to store an array of JSON objects containing candidate scores
      let shortlistScores = [];

      // tiny UX sugar (mock only)
      document
        .querySelectorAll("a.step")
        .forEach((a) => a.addEventListener("click", () => {}));

      // TODO: complete below functions
      function openProfile(profileId, firstName, lastName, step) {
        const temporaryProfiles = JSON.parse(
          sessionStorage.getItem("temporaryProfiles") || "{}",
        );
        const tempProfile = temporaryProfiles[String(profileId)];

        sessionStorage.setItem("candidateId", profileId);
        sessionStorage.setItem("candidateName", firstName + " " + lastName);
        sessionStorage.setItem(
          "candidateStatus",
          tempProfile ? "Temporary Profile" : step,
        );
        if (tempProfile) {
          sessionStorage.setItem("candidateProfileType", "Temporary Profile");
          sessionStorage.setItem("externalCandidateSource", tempProfile.source || "External");
        } else {
          sessionStorage.removeItem("candidateProfileType");
          sessionStorage.removeItem("externalCandidateSource");
        }

        window.location.href = "profile-preview.html";
      }

      function removeProfile(profileId) {
        shortlistArray = shortlistArray.filter(
          (candidate) => candidate !== profileId,
        );

        shortlistScores = shortlistScores.filter(
          (candidate) => candidate.id !== profileId,
        );

        sessionStorage.setItem("shortlist", shortlistArray);

        document.getElementById("candidate" + profileId).remove();
      }

      async function generateEmail() {
        const jobId = sessionStorage.getItem("jobID");

        const result = await fetch(`/api/ai/clientEmail/shortlist`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            jobId: jobId,
            candidateScores: shortlistScores,
          }),
        });

        if (!result.ok) alert("Error generating email.");

        const emailData = await result.json();

        document.getElementById("emailArea").innerHTML = emailData.email;
        sessionStorage.setItem("clientEmail", emailData.email);
      }

      async function attachProfileLinks() {
        const baseUrl = window.location.origin;

        for (let i = 0; i < shortlistArray.length; i++) {
          const candidateId = shortlistArray[i];

          const profileUrl = await api(
            `/api/azure/public/getPublicUrl/${candidateId}`,
            {
              method: "GET",
            },
          );

          console.log(profileUrl);

          const fullUrl = `${baseUrl}/profile-preview.html?user=${profileUrl}`;

          const profileData = await api(
            `/api/azure/getProfile/short/${candidateId}`,
          );

          document.getElementById("emailArea").innerHTML +=
            `\n\nProfile for candidate ${profileData.firstName} ${profileData.lastName}: ${fullUrl}`;
        }
      }

      async function sendEmail() {
        const emailContent = document.getElementById("emailArea").value;
        if (emailContent && emailContent.length > 0) {
          window.location.href = `mailto:INSERT_EMAIL?subject=DevReady Candidates - ${sessionStorage.getItem("jobTitle")}&body=${encodeURIComponent(emailContent)}`;
        }
      }

      document.addEventListener("DOMContentLoaded", async () => {
        const shortlist = sessionStorage.getItem("shortlist");
        const jobId = sessionStorage.getItem("jobID");
        document.getElementById("emailArea").innerHTML =
          sessionStorage.getItem("clientEmail");

        if (shortlist && shortlist.length > 0) {
          shortlistArray = shortlist.split(",");
          document.getElementById("shortlistCount").innerText =
            `Shortlist (Top ${shortlistArray.length})`;

          const shortlistTable = document.getElementById("shortlistBody");

          if (!jobId || jobId.length < 1) {
            shortlistArray.forEach(async (candidate) => {
              try {
                const profileData = await api(
                  `/api/azure/getProfile/short/${candidate}`,
                );

                shortlistTable.insertAdjacentHTML(
                  "beforeend",
                  (() => {
                    const temporaryProfiles = JSON.parse(sessionStorage.getItem("temporaryProfiles") || "{}");
                    const tempProfile = temporaryProfiles[String(candidate)];
                    const statusLabel = tempProfile ? "Temporary Profile" : (profileData.status || "Status Missing");
                    return `<tr id="candidate${candidate}">
                    <td><strong>${profileData.firstName} ${profileData.lastName}</strong></td>
                    <td>Job Missing</td>
                    <td><span class="pill" ${!statusLabel ? 'style="background: red;"' : ""}>${statusLabel}</span></td>
                    <td>
                      <button
                        class="btn secondary"
                        style="padding: 8px 12px"
                        onclick="openProfile('${candidate}','${profileData.firstName}','${profileData.lastName}','${statusLabel}')"
                      >
                        Open
                      </button>
                    </td>
                    <td>
                      <button
                        class="btn remove"
                        style="padding: 8px 12px"
                        onclick="removeProfile('${candidate}')"
                      >
                        Remove
                      </button>
                    </td>
                  </tr>`;
                  })(),
                );
              } catch (error) {
                console.log(error);

                console.log("Could not find candidate with ID " + candidate);
              }
            });
          } else {
            const fd = new FormData();
            fd.append("profileIds", shortlist);

            const profileData = await api(
              `/api/azure/getProfile/short/score/${jobId}`,
              { method: "POST", body: fd },
            );

            console.log(profileData);

            // TODO: Work out candidate scores
            profileData.forEach((candidate) => {
              shortlistScores.push({
                id: candidate.id,
                name: candidate.firstName + candidate.lastName,
                score: candidate.score + "%",
              });

              shortlistTable.insertAdjacentHTML(
                "beforeend",
                (() => {
                  const temporaryProfiles = JSON.parse(sessionStorage.getItem("temporaryProfiles") || "{}");
                  const tempProfile = temporaryProfiles[String(candidate.id)];
                  const statusLabel = tempProfile ? "Temporary Profile" : (candidate.status || "Status Missing");
                  return `<tr id="candidate${candidate.id}">
                    <td><strong>${candidate.firstName} ${candidate.lastName}</strong></td>
                    <td>${candidate.score * 10}</td>
                    <td><span class="pill" ${!statusLabel ? 'style="background: red;"' : ""}>${statusLabel}</span></td>
                    <td>
                      <button
                        class="btn secondary"
                        style="padding: 8px 12px"
                        onclick="openProfile('${candidate.id}','${candidate.firstName}','${candidate.lastName}','${statusLabel}')"
                      >
                        Open
                      </button>
                    </td>
                    <td>
                      <button
                        class="btn remove"
                        style="padding: 8px 12px"
                        onclick="removeProfile('${candidate.id}')"
                      >
                        Remove
                      </button>
                    </td>
                  </tr>`;
                })(),
              );
            });
          }
        }
      });
    </script>
  </body>
</html>
